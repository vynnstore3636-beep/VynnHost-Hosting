  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Poppins", sans-serif;
      background: url('https://files.catbox.moe/1hkwy4.jpg') no-repeat center center fixed;
      background-size: cover;

    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.65);
      z-index: -1;
    }
    header {
      text-align: center;
      padding: 40px 20px;
      background: rgba(0,0,0,0.6);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border-radius: 0 0 15px 15px;
    }
    header h1 {
      font-family: "Raleway", sans-serif;
      font-size: 36px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #ffcc70, 0 0 20px rgba(255,204,112,0.6);
    }
    .container {
      width: 90%;
      max-width: 1100px;
      margin: 40px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 0 25px rgba(255,255,255,0.6), 0 0 40px rgba(255,204,112,0.5);
    }
    .harga { font-weight: bold; color: #ffcc70; margin-bottom: 15px; }
    .btn {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 8px;
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
      animation: pulse 2s infinite;
    }
    .btn i { margin-right: 6px; }
    .btn:hover {
      box-shadow: 0 0 20px rgba(238,9,121,0.9);
      transform: scale(1.07);
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(238,9,121,0.7); }
      70% { box-shadow: 0 0 0 15px rgba(238,9,121,0); }
      100% { box-shadow: 0 0 0 0 rgba(238,9,121,0); }
    }
    footer {
      margin-top: 40px;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      text-align: center;
      border-radius: 15px 15px 0 0;
    }
    /* Testimoni */
    .testimoni {
      text-align: center;
      margin: 40px 20px;
    }
    .testimoni-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .testimoni-box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      font-size: 14px;
      line-height: 1.5;
    }
    .testimoni-box strong {
      display: block;
      margin-top: 10px;
      color: #ffcc70;
    }
  </style>
</head>
<body>
  <header>
    <h1><i class="fas fa-store"></i> Toko Hosting Premium By VynnHost</h1>
    <p>Produk Panel, Jasa Digital & Premium Apps</p>
  </header>

  <div class="container" id="produk-list"></div>

  <!-- Metode Pembayaran -->
  <section style="text-align:center; margin:40px 20px;">
    <h2 data-aos="fade-up">💳 Metode Pembayaran</h2>
    <p data-aos="fade-up"><b>DANA / GOPAY:</b> 081340069377</p>
    <p data-aos="fade-up"><b>QRIS:</b></p>
    <img src="https://files.catbox.moe/v4a1q5.jpg" width="160" style="border-radius:8px;" data-aos="zoom-in">
    <p data-aos="fade-up"><a href="https://wa.me/6285134770776" style="color:#ffcc70; font-weight:bold; text-decoration:none;">Hubungi admin setelah transfer ✅</a></p>
  </section>

  <!-- Testimoni -->
  <section class="testimoni">
    <h2 data-aos="fade-up"><i class="fas fa-comments"></i> Testimoni Pelanggan</h2>
    <div class="testimoni-grid" id="testimoni-list"></div>
  </section>

  <footer>
    <p>&copy; 2025 Toko Hosting Premium By VynnHost</p>
    <a href="https://wa.me/6281340069377" class="btn"><i class="fab fa-whatsapp"></i> Hubungi Admin</a>
  </footer>

  <!-- AOS + Script Produk + Script Testimoni -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const hargaProduk = {
        "⚡ PANEL UNLIMITED": "3.000",
        "📦 RESELLER PANEL": "5.000p",
        "👑 ADMIN PANEL": "7.500",
        "🤝 PARTNER PANEL": "10.000",
        "🏆 OWNER PANEL": "12.500",
        "💎 PARTNER VIP": "15.000",
        "🤖 SCRIPT BOT WHATSAPP": "20.000",
        "🤖 SCRIPT BOT TELEGRAM": "25.000",
        "🛠️ JASA FIX SCRIPT": "15.000",
        "⚙️ JASA TAMBAH FITUR SCRIPT": "25.000",
        "🎭 JASA EDIT LOGO": "5.000",
        "📱 NOKOS INDONESIA": "7.500",
        "🌏 NOKOS PHILIPINA": "12.000",
        "📢 JASA SHARE": "3.000"
      };

      const produkList = document.getElementById("produk-list");
      Object.keys(hargaProduk).forEach(nama => {
        const card = document.createElement("div");
        card.className = "card";
        card.setAttribute("data-aos", "zoom-in");

        card.innerHTML = `
          <h3>${nama}</h3>
          <p class="harga">${hargaProduk[nama]}</p>
          <a href="https://wa.me/6285134770776?text=Beli%20${encodeURIComponent(nama)}" class="btn">
            <i class="fab fa-whatsapp"></i> Beli Sekarang
          </a>
        `;

        produkList.appendChild(card);
      });

      const testimoniData = [
        {
          nama: "Hanzz official",
          lokasi: "indonesia",
          komentar: "Pelayanan cepat, harga murah, produk aman 👍",
          bintang: 4.5
        },
        {
          nama: "Kuzen",
          lokasi: "indonesia",
          komentar: "Sangat puas beli di sini, admin ramah banget.",
          bintang: 5
        },
        {
          nama: "Noxa dev",
          lokasi: "malaysia",
          komentar: "Produk sesuai deskripsi, recomended seller ⭐⭐⭐⭐⭐",
          bintang: 5
        }
      ];

      const testimoniList = document.getElementById("testimoni-list");

      testimoniData.forEach(t => {
        const box = document.createElement("div");
        box.className = "testimoni-box";
        box.setAttribute("data-aos", "zoom-in");

        let stars = "";
        const fullStars = Math.floor(t.bintang);
        const halfStar = t.bintang % 1 !== 0;
        for (let i = 0; i < fullStars; i++) stars += '<i class="fas fa-star"></i>';
        if (halfStar) stars += '<i class="fas fa-star-half-alt"></i>';

        box.innerHTML = `
          <p>"${t.komentar}"</p>
          <div style="color:#ffcc70; margin:8px 0;">${stars}</div>
          <strong><i class="fas fa-user-circle"></i> ${t.nama}, ${t.lokasi}</strong>
        `;

        testimoniList.appendChild(box);
      });

      AOS.init({ duration: 900, once: false });
    });
  </script>
</body>
</html>
